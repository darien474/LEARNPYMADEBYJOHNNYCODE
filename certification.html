<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification - PyLearn</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">PyLearn</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="learn.html">Learn</a>
                <a href="quiz.html">Quiz</a>
                <a href="test.html">Test</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
            <div class="user-info" id="userInfo"></div>
        </nav>

        <main class="main-content">
            <div class="certificate-container">
                <div class="certificate" id="certificate">
                    <h1>Certificate of Completion</h1>
                    <p>This is to certify that</p>
                    <h2 id="userName"></h2>
                    <p>has successfully completed all Python tests</p>
                    <div class="certificate-message">
                        Congratulations. You learn python!
                    </div>
                    <div class="certificate-footer">
                        <p>Made by JohnnyCode</p>
                        <p>PyLearn Platform</p>
                    </div>
                </div>
                <button onclick="downloadCertificate()" class="btn primary">Download Certificate</button>
            </div>
        </main>

        <footer class="footer">
            <p>Made by JohnnyCode</p>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/certification.js"></script>
</body>
</html>
